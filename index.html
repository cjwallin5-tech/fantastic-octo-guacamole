<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chaos Chess</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Chess+Berlin&family=Press+Start+2P&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Press Start 2P', cursive;
      color: #eee;
      padding: 20px;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 10px;
      color: #e94560;
      text-shadow: 0 0 10px #e94560;
    }

    #turn-indicator {
      font-size: 0.8rem;
      margin-bottom: 10px;
      color: #00d9ff;
    }

    #rules-container {
      background: rgba(0, 0, 0, 0.5);
      border: 2px solid #e94560;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      max-width: 500px;
      width: 100%;
    }

    #rules-container h2 {
      font-size: 0.7rem;
      color: #e94560;
      margin-bottom: 10px;
    }

    #rules-list {
      font-family: 'Chess Berlin', sans-serif;
      font-size: 1rem;
      line-height: 1.8;
    }

    .rule {
      padding: 5px;
      margin: 3px 0;
      background: rgba(233, 69, 96, 0.2);
      border-radius: 5px;
      animation: popIn 0.3s ease-out;
    }

    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    #board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      width: min(90vw, 500px);
      height: min(90vw, 500px);
      border: 4px solid #e94560;
      border-radius: 5px;
      box-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
    }

    .square {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Chess Berlin', sans-serif;
      font-size: min(8vw, 45px);
      cursor: pointer;
      transition: all 0.2s;
    }

    .square.light {
      background-color: #b58863 !important;
    }

    .square.dark {
      background-color: #7b5c42 !important;
    }

    .square.selected {
      background: #6a4a9a !important;
      box-shadow: inset 0 0 20px #9b59b6;
    }

    .square.valid-move {
      position: relative;
    }

    .square.valid-move::after {
      content: '';
      position: absolute;
      width: 30%;
      height: 30%;
      background: rgba(0, 217, 255, 0.7);
      border-radius: 50%;
    }

    .square.valid-capture {
      background: #e94560 !important;
    }

    .square.check {
      background: #ff0000 !important;
      animation: pulse 0.5s infinite alternate;
    }

    @keyframes pulse {
      0% { box-shadow: inset 0 0 10px #ff0000; }
      100% { box-shadow: inset 0 0 30px #ff6666; }
    }

    .piece {
      user-select: none;
      transition: transform 0.2s;
      font-size: 2.5rem;
      font-weight: bold;
    }

    .piece:hover {
      transform: scale(1.1);
    }

    .piece.white { color: #ffffff !important; text-shadow: 1px 1px 2px #000; }
    .piece.black { color: #000000 !important; text-shadow: 0 0 1px #fff; }

    #game-over {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #game-over.show {
      display: flex;
    }

    #game-over h2 {
      font-size: 1.5rem;
      color: #e94560;
      margin-bottom: 20px;
    }

    button {
      font-family: 'Press Start 2P', cursive;
      font-size: 0.8rem;
      padding: 15px 30px;
      background: #e94560;
      border: none;
      color: #fff;
      cursor: pointer;
      border-radius: 5px;
      transition: all 0.2s;
    }

    button:hover {
      background: #ff6b8a;
      transform: scale(1.05);
    }

    #move-history {
      margin-top: 15px;
      font-size: 0.5rem;
      max-height: 100px;
      overflow-y: auto;
      width: min(90vw, 500px);
      background: rgba(0, 0, 0, 0.3);
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <h1>CHAOS CHESS</h1>
  <div id="turn-indicator">White to move</div>
  <div id="rules-container">
    <h2>CHAOS RULES</h2>
    <div id="rules-list">
      <div class="rule">Standard chess rules apply</div>
      <div class="rule">Checkmate the opponent to win</div>
    </div>
  </div>
  <div id="board"></div>
  <div id="move-history"></div>
  </div>
  </div>
  <div id="game-over">
    <h2 id="winner-text">Game Over!</h2>
    <button onclick="restartGame()">Play Again</button>
  </div>
  <script src="chess.js"></script>
</body>
</html>
